name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - upload-service
          - processing-service
          - report-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: pytest tests/ -v --tb=short

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose build --no-cache

  integration:
    name: Integration Check
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: echo "ANTHROPIC_API_KEY=test-key-placeholder" > .env

      - name: Start services
        run: docker compose up -d --wait --wait-timeout 60
        timeout-minutes: 3

      - name: Health check — API Gateway
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
            [ "$STATUS" = "200" ] && echo "API Gateway healthy" && exit 0
            echo "Attempt $i — waiting…"; sleep 5
          done
          echo "API Gateway health check failed" && exit 1

      - name: Health check — Upload Service
        run: curl -sf http://localhost:8001/health

      - name: Health check — Report Service
        run: curl -sf http://localhost:8003/health

      - name: Stop services
        if: always()
        run: docker compose down -v
